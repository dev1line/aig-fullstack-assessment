AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Fargate + ALB backend service for the sentiment analysis NestJS API.

Parameters:
  ProjectName:
    Type: String
    Description: Project name prefix for tagging and resource naming.

  VpcId:
    Type: String
    Description: VPC ID where ECS and ALB will run.

  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: Private subnet IDs for ECS tasks.

  PublicSubnetIds:
    Type: CommaDelimitedList
    Description: Public subnet IDs for ALB.

  ImageUrl:
    Type: String
    Description: Full ECR image URL (e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-backend:latest).

  ContainerPort:
    Type: Number
    Default: 3001
    Description: Port that the NestJS backend listens on inside the container.

  DesiredCount:
    Type: Number
    Default: 2

  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string for the backend (e.g., RDS or external Postgres).
    NoEcho: true

  CorsAllowedOrigins:
    Type: String
    Default: ''
    Description: Comma-separated allowed CORS origins (e.g. https://d123.cloudfront.net,http://localhost:3000). Leave empty to allow all origins.

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-cluster'

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: '-1'
          FromPort: 0
          ToPort: 0
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS service security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: '-1'
          FromPort: 0
          ToPort: 0
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-svc-sg'

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Type: application

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg'
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200-399

  ListenerHttp:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ApiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub '${ProjectName} API (HTTPS for frontend)'
        Enabled: true
        DefaultRootObject: ''
        PriceClass: PriceClass_All
        Origins:
          - Id: ALBOrigin
            DomainName: !GetAtt LoadBalancer.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 5
        DefaultCacheBehavior:
          TargetOriginId: ALBOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          Compress: true
        HttpVersion: http2and3

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-task-execution-role'

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies: []
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-task-role'

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-backend'
      RetentionInDays: 7

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-backend'
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Ref ImageUrl
          EntryPoint:
            - /docker-entrypoint.sh
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: DATABASE_URL
              Value: !Ref DatabaseUrl
            - Name: PORT
              Value: !Ref ContainerPort
            - Name: ALLOWED_ORIGINS
              Value: !Ref CorsAllowedOrigins
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - ListenerHttp
    Properties:
      ServiceName: !Sub '${ProjectName}-backend-svc'
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 120
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ServiceSecurityGroup
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref Cluster

  ServiceName:
    Description: ECS Service name
    Value: !Ref Service

  LoadBalancerDNSName:
    Description: Public DNS name of the ALB
    Value: !GetAtt LoadBalancer.DNSName

  ApiDistributionDomainName:
    Description: CloudFront domain for API (use https://<this> for NEXT_PUBLIC_API_URL to avoid mixed content)
    Value: !GetAtt ApiDistribution.DomainName
    Export:
      Name: !Sub '${ProjectName}-ApiDistributionDomain'

  ApiUrl:
    Description: HTTPS URL for the backend API (frontend should use this)
    Value: !Sub 'https://${ApiDistribution.DomainName}'
    Export:
      Name: !Sub '${ProjectName}-ApiUrl'

